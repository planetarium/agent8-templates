<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadow Ninja: Demon Slayer</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: 'Noto Serif JP', serif;
        background: #0a0a0a;
      }
      .loading-container {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #0a0a0a 0%, #1a0505 50%, #0a0a0a 100%);
        color: white;
      }
      .loading-kanji {
        font-family: 'Noto Serif JP', serif;
        font-size: 3.5rem;
        font-weight: 900;
        color: #dc2626;
        text-shadow: 0 0 30px rgba(220,38,38,0.5), 0 0 60px rgba(220,38,38,0.2);
        margin-bottom: 0.5rem;
        letter-spacing: 0.3em;
      }
      .loading-subtitle {
        font-family: 'Noto Serif JP', serif;
        font-size: 0.75rem;
        font-weight: 400;
        color: #991b1b;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        margin-bottom: 2rem;
      }
      .loading-line {
        width: 120px;
        height: 1px;
        background: linear-gradient(90deg, transparent, #dc2626, transparent);
        margin-bottom: 1.5rem;
      }
      .spinner {
        width: 30px;
        height: 30px;
        border: 2px solid rgba(220, 38, 38, 0.2);
        border-radius: 50%;
        border-top-color: #dc2626;
        animation: spin 1s ease-in-out infinite;
      }
      .loading-dots {
        margin-top: 1rem;
        font-size: 0.7rem;
        color: #666;
        letter-spacing: 0.3em;
        text-transform: uppercase;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      (function () {
        function reportGameSize() {
          const height = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);

          const width = Math.max(document.body.scrollWidth, document.documentElement.scrollWidth);

          window.parent.postMessage(
            {
              type: 'GAME_SIZE_RESPONSE',
              height: height,
              width: width,
            },
            '*',
          );
        }

        window.addEventListener('load', reportGameSize);

        window.addEventListener('resize', reportGameSize);

        window.addEventListener('message', function (event) {
          if (event.data && event.data.type === 'REQUEST_GAME_SIZE') {
            reportGameSize();
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="loading-container">
        <div class="loading-kanji">SHADOW NINJA</div>
        <div class="loading-subtitle">Demon Slayer</div>
        <div class="loading-line"></div>
        <div class="spinner"></div>
        <div class="loading-dots">Entering the Demon Realm...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
