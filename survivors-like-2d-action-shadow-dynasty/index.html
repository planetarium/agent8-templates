<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=MedievalSharp&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadow Dynasty</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: 'Cinzel', 'Times New Roman', serif;
      }
      .loading-container {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #0a0008;
        color: #c084fc;
      }
      .loading-title {
        font-size: 1.8rem;
        font-weight: 900;
        margin-bottom: 0.5rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        font-family: 'Cinzel', serif;
        text-shadow: 0 0 20px rgba(168,85,247,0.5);
      }
      .loading-subtitle {
        font-size: 0.7rem;
        color: #7c3aed;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        margin-bottom: 2rem;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(168, 85, 247, 0.15);
        border-radius: 50%;
        border-top-color: #a855f7;
        border-bottom-color: #7c3aed;
        animation: spin 1.2s ease-in-out infinite;
        box-shadow: 0 0 15px rgba(168,85,247,0.3);
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      (function () {
        function reportGameSize() {
          const height = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);

          const width = Math.max(document.body.scrollWidth, document.documentElement.scrollWidth);

          window.parent.postMessage(
            {
              type: 'GAME_SIZE_RESPONSE',
              height: height,
              width: width,
            },
            '*',
          );
        }

        window.addEventListener('load', reportGameSize);

        window.addEventListener('resize', reportGameSize);

        window.addEventListener('message', function (event) {
          if (event.data && event.data.type === 'REQUEST_GAME_SIZE') {
            reportGameSize();
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="loading-container">
        <h2 class="loading-title">Shadow Dynasty</h2>
        <div class="loading-subtitle">Awakening the darkness</div>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
