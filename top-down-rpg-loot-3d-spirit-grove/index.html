<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPIRIT GROVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: 'Philosopher', serif;
        background: #0a1a0a;
      }
      .loading-container {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #0d1f0d 0%, #1a2e1a 50%, #0a1a0a 100%);
        color: #c4a265;
      }
      .loading-title {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 1rem;
        letter-spacing: 6px;
        text-shadow: 0 0 15px rgba(196,162,101,0.6);
        font-family: 'Cinzel', serif;
      }
      .spinner {
        width: 30px;
        height: 30px;
        border: 2px solid rgba(196, 162, 101, 0.2);
        border-radius: 50%;
        border-top-color: #c4a265;
        border-right-color: #6b8f4e;
        animation: spin 1.2s ease-in-out infinite;
        box-shadow: 0 0 15px rgba(196, 162, 101, 0.3);
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      (function () {
        function reportGameSize() {
          const height = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
          const width = Math.max(document.body.scrollWidth, document.documentElement.scrollWidth);
          window.parent.postMessage(
            {
              type: 'GAME_SIZE_RESPONSE',
              height: height,
              width: width,
            },
            '*',
          );
        }

        window.addEventListener('load', reportGameSize);
        window.addEventListener('resize', reportGameSize);

        window.addEventListener('message', function (event) {
          if (event.data && event.data.type === 'REQUEST_GAME_SIZE') {
            reportGameSize();
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="loading-container">
        <h2 class="loading-title">AWAKENING</h2>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
